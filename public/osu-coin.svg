<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="osu! coin">
  <defs>
    <radialGradient id="osuCoinFace" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#ffb0cf" />
      <stop offset="45%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#a8164f" />
    </radialGradient>
    <linearGradient id="osuCoinRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd0e2" />
      <stop offset="100%" stop-color="#9c1349" />
    </linearGradient>
    <radialGradient id="osuCoinSheen" cx="36%" cy="26%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Minted rim + face -->
  <circle cx="32" cy="32" r="31" fill="url(#osuCoinRim)" />
  <circle cx="32" cy="32" r="27.5" fill="url(#osuCoinFace)" />
  <!-- osu!-style hit-circle ring -->
  <circle cx="32" cy="32" r="18.5" fill="none" stroke="#ffffff" stroke-opacity="0.92" stroke-width="3.5" />
  <circle cx="32" cy="32" r="6.5" fill="#ffffff" fill-opacity="0.95" />
  <!-- Specular sheen -->
  <ellipse cx="25" cy="22" rx="15" ry="11" fill="url(#osuCoinSheen)" />
</svg>
