# OsuStocks.Web — run with: npm run docker:up   (or: docker compose up --build)
#
# The port and API URL come from .env (the single source of truth). Compose reads
# .env automatically for the ${VAR} substitutions below. NEXT_PUBLIC_API_BASE_URL
# is inlined into the client bundle at build time; because API calls happen in the
# browser, the default http://localhost:5152 targets the host's API.
services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5152}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        PORT: ${PORT:-3000}
    image: osustocks-web
    container_name: osustocks-web
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
    restart: unless-stopped
